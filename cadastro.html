<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <h1>Cadastro de Pessoa</h1>
    <form>
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome">

        <label>Tipo</label>
        <div class="radio-group">
            <label>
                <input type="radio" name="tipo" value="pf" onclick="selecionarTipo('pf')"> Pessoa Física
            </label>
            <label>
                <input type="radio" name="tipo" value="pj" onclick="selecionarTipo('pj')"> Pessoa Jurídica
            </label>
        </div>

        <div id="tipo-pf">
            <label for="cpf">CPF</label>
            <input type="text" id="cpf" name="cpf">

            <label for="rg">RG</label>
            <input type="text" id="rg" name="rg">

            <label for="data-nascimento">Data de Nascimento</label>
            <input type="date" id="data-nascimento" name="data-nascimento">
        </div>

        <div id="tipo-pj">
            <label for="cnpj">CNPJ</label>
            <input type="text" id="cnpj" name="cnpj">

            <label for="razao-social">Razão Social</label>
            <input type="text" id="razao-social" name="razao-social">
        </div>

        <button type="submit">Cadastrar</button>
    </form>

    

    

    <script src="./assets/js/cadastro.js"></script>
</body>
</html>
