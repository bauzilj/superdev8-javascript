<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Sistema de Cadastro de Imóveis</title>
    <link rel="stylesheet" href="./assets/css/cadastro-imoveis.css">

</head>

<body>

    <div class="container">


        <div class="card">

            <h1>🏠 Cadastro de Imóvel</h1>
            <p id="mensagem-alert"></p>

            <div class="form-group">
                <label>Proprietário</label>
                <input type="text" id="proprietario">
            </div>

            <div class="form-group">
                <label>Localidade</label>
                <input type="text" id="localidade">
            </div>

            <div class="form-group">
                <label>Valor do imóvel</label>
                <input type="text" id="valor-imovel">
            </div>

            <div class="form-group">
                <label>Área (m²)</label>
                <input type="text" id="m2-imovel">
            </div>

            <div class="form-group">
                <label>Possui construção?</label>
                <select id="construcao">
                    <option value="" disabled selected>Selecione</option>
                    <option value="Sim">Sim</option>
                    <option value="Não">Não</option>
                </select>
            </div>

            <button id="botao-salvar">Salvar Imóvel</button>

        </div>


        <div class="card">

            <h2>📊 Imóveis cadastrados</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Proprietário</th>
                            <th>Localidade</th>
                            <th>Valor</th>
                            <th>Área (m²)</th>
                            <th>Construção</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="imoveis"></tbody>

                </table>
            </div>

        </div>

    </div>

    <script src="./assets/js/cadastro-imoveis.js"></script>

</body>

</html>
