<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro funcionários</title>
    <link rel="stylesheet" href="./assets/css/cadastro-funcionarios.css">
</head>

<body>
    <div class="main-content">
        <h1>Cadastro funcionários</h1>
        <p id="alert" class="mensagem"></p>
        <div>
            <label for="nome">Nome</label>
            <input type="text" id="nome" name="nome">
        </div>

        <div>
            <label for="cargo">Cago</label>
            <input type="text" id="cargo" name="cargo">
        </div>

        <div>
            <label for="salario">Salário</label>
            <input type="text" id="salario" name="salario">
        </div>

        <div>
            <label for="qtdFilho">Quantidade de filhos</label>
            <input type="text" id="qtdFilho">
        </div>

        <div>
            <button id="botao-cadastrar">Cadastrar</button>
        </div>
    </div>
       <div class="main-table">
            <table border="1px solid black">
                <thead>
                    <tr>
                        <th>Código</th>
                        <th>Nome</th>
                        <th>Cargo</th>
                        <th>Salário</th>
                        <th>Quantidade de filhos</th>
                        <th>Auxílio família</th>
                        <th>Salário final</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="funcionario">
                </tbody>
            </table>
        </div>

    <script src="./assets/js/cadastro-funcionario.js"></script>
</body>

</html>
