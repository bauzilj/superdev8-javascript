<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de moeda</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md">

        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">
            💱 Conversor de moeda
        </h1>

        <div class="flex flex-col gap-4">

            <label for="campo-real" class="text-gray-700 font-medium">
                🇧🇷 Real Brasileiro (BRL)
            </label>

            <input 
                type="text" 
                id="campo-real"
                placeholder="Digite o valor em reais"
                class="border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >

            <select 
                name="moedas" 
                id="moeda-select"
                class="border border-gray-300 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
            >
                <option value="" selected disabled>-- Por favor selecione a moeda --</option>
                <option value="USD">🇺🇸 Dólar Americano (USD)</option>
                <option value="EUR">🇪🇺 Euro (EUR)</option>
                <option value="GBP">🇬🇧 Libra Esterlina (GBP)</option>
                <option value="CAD">🇨🇦 Dólar Canadense (CAD)</option>
                <option value="JPY">🇯🇵 Iene Japonês (JPY)</option>
                <option value="ARS">🇦🇷 Peso Argentino</option>
                <option value="CHF">🇨🇭 Franco Suíço (CHF)</option>
                <option value="CNY">🇨🇳 Yuan Chinês (CNY)</option>
            </select>

            <button 
                id="botao-conversao"
                class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg transition"
            >
                Converter
            </button>

        </div>

        <ul id="resultados" class="mt-6 bg-gray-50 p-4 rounded-lg">
            <li id="result" class="text-gray-800 font-medium">
                R$ 2000,00 => $381.4
            </li>
        </ul>

    </div>

    <script src="./assets/js/curency-table.js"></script>

</body>

</html>
