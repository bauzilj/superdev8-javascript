<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de produtos</title>
</head>
<body>
    <div class="main-content">
        <h1>Cadastro de produtos</h1>

        <div>
            <label for="nome-produto">Nome do produto</label>
            <input type="text" id="nome-produto" name="nome-produto">
        </div>
        <div>
            <label for="categoria">Categoria</label>
            <input type="text" id="categoria" name="categoria">
        </div>
        <div>
            <label for="preco">Preço</label>
            <input type="number" id="preco" name="preco">
        </div>
        <div>
            <label for="qtdEmEstoque">Quantidade em estoque</label>
            <input type="number" id="qtdEmEstoque" name="qtdEmEstoque">
        </div>
        <div>
            <button id="botao-add">Adicionar Produtos</button>
        </div>

    </div>
    <script src="./assets/js/cadastro-produtos.js"></script>
</body>
</html>
