<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de produtos</title>

    <link rel="stylesheet" href="./assets/css/cadastro-produtos.css">
</head>

<body>

    <!-- Formulário -->
    <div class="container">
        <h1>Cadastro de produtos</h1>
        <p id="mensagem-alert"></p>

        <div class="form-group">
            <label for="nome-produto">Nome do produto</label>
            <input type="text" id="nome-produto">
        </div>

        <div class="form-group">
            <label for="categoria">Categoria</label>
            <input type="text" id="categoria">
        </div>

        <div class="form-group">
            <label for="preco">Preço</label>
            <input type="number" id="preco">
        </div>

        <div class="form-group">
            <label for="qtdEmEstoque">Quantidade em estoque</label>
            <input type="number" id="qtdEmEstoque">
        </div>

        <button id="botao-add">Adicionar Produto</button>
    </div>

    <!-- Tabela -->
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Nome do produto</th>
                    <th>Categoria</th>
                    <th>Preço</th>
                    <th>Quantidade em estoque</th>
                    <th>Valor total em estoque</th>
                    <th>Ações</th>
                </tr>
            </thead>

            <tbody id="produtos">
            </tbody>
        </table>
    </div>

    <script src="./assets/js/cadastro-produtos.js"></script>
</body>
</html>
