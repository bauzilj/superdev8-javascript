<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de produtos</title>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex flex-col items-center p-6">

    <!-- Formulário -->
    <div class="bg-white shadow-lg rounded-xl p-6 w-full max-w-lg mb-8">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">
            Cadastro de produtos
        </h1>

        <div class="space-y-4">

            <div class="flex flex-col">
                <label for="nome-produto" class="text-sm font-semibold text-gray-600" id="label-produto">
                    Nome do produto
                </label>
                <input type="text" id="nome-produto" name="nome-produto"
                    class="border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex flex-col">
                <label for="categoria" class="text-sm font-semibold text-gray-600" id="label-categoria">
                    Categoria
                </label>
                <input type="text" id="categoria" name="categoria"
                    class="border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex flex-col">
                <label for="preco" class="text-sm font-semibold text-gray-600" id="label-preco">
                    Preço
                </label>
                <input type="number" id="preco" name="preco"
                    class="border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <div class="flex flex-col">
                <label for="qtdEmEstoque" class="text-sm font-semibold text-gray-600" id="label-quantidade">
                    Quantidade em estoque
                </label>
                <input type="number" id="qtdEmEstoque" name="qtdEmEstoque"
                    class="border rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button id="botao-add"
                class="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition">
                Adicionar Produto
            </button>

        </div>
    </div>

    <!-- Tabela -->
    <div class="w-full max-w-5xl bg-white shadow-lg rounded-xl p-6">
        <table class="w-full border-collapse">

            <thead>
                <tr class="bg-gray-200 text-gray-700">
                    <th class="p-3 text-left">Código</th>
                    <th class="p-3 text-left">Nome do produto</th>
                    <th class="p-3 text-left">Categoria</th>
                    <th class="p-3 text-left">Preço</th>
                    <th class="p-3 text-left">Quantidade em estoque</th>
                    <th class="p-3 text-left">Valor total em estoque</th>
                </tr>
            </thead>

            <tbody id="produtos" class="divide-y">
               
            </tbody>

        </table>
    </div>

    <script src="./assets/js/cadastro-produtos.js"></script>
</body>
</html>
